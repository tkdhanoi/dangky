<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ĐĂNG KÝ THI CẤP</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 20px;
    }
.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}

.logo {
  height: 100px;
  object-fit: contain;
}

.title {
  flex: 1;
  text-align: center;
  font-size: 36px;
  font-weight: 700;
}

    .container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      padding: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input, select {
      width: 95%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 15px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #2563eb, #111827);
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-submit:hover {
      opacity: 0.9;
    }

    .success {
      display: none;
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      background: #ecfdf5;
      border: 1px solid #10b981;
      color: #065f46;
      font-weight: 600;
    }

    .error {
      display: none;
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      background: #fef2f2;
      border: 1px solid #ef4444;
      color: #7f1d1d;
      font-weight: 600;
    }

    @media(max-width: 600px) {
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="container">

  <div class="header">
    <img src="Logo.jpg" alt="Logo" class="logo">
    <div class="title">ĐĂNG KÝ THI CẤP</div>
  </div>

      </div>

      <div class="form-group">
        <label>Thời gian thi *</label>
        <div class="row">
          <input type="date" name="ngay_thi" required />
          <input type="time" name="gio_thi" required />
        </div>
      </div>

      <div class="form-group">
        <label>Địa điểm thi *</label>
        <input type="text" name="dia_diem" placeholder="Nhập địa điểm thi" required />
      </div>

      <div class="form-group">
        <label>Số lượng dự kiến *</label>
        <input type="number" name="so_luong" placeholder="Nhập số lượng" required />
      </div>

      <div class="form-group">
        <label>ĐT Liên hệ *</label>
        <input type="tel" name="dien_thoai" placeholder="Nhập số điện thoại" required />
      </div>

      <button class="btn-submit" type="submit">XÁC NHẬN ĐĂNG KÝ</button>

      <div class="success" id="successMsg">Đăng ký thành công! Dữ liệu đã được gửi.</div>
      <div class="error" id="errorMsg">Gửi dữ liệu thất bại. Vui lòng thử lại.</div>
    </form>
  </div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzB5CkEWNAJrxOP-qC9p-yZI2mjVi9N5HiQ4FsloVrRmnD26B5ahTv-nqJPnFiZb-gt/exec";

  const form = document.getElementById("registerForm");
  const successMsg = document.getElementById("successMsg");
  const errorMsg = document.getElementById("errorMsg");

  const submitBtn = document.querySelector(".btn-submit");

	let sending = false;

	// DANH SÁCH CLB HỢP LỆ
	const validCLB = [

	  "CLB_00201",
	  "CLB_00202",
	  "CLB_00215",
	  "CLB_00260",
	  "CLB_00383",
	  "CLB_00593",
	  "CLB_00603",
	  "CLB_00604",
	  "CLB_00605",

	  "CLB_01081",
	  "CLB_01103",
	  "CLB_01267",
	  "CLB_01353",
	  "CLB_01369",
	  "CLB_01371",
	  "CLB_01453",
	  "CLB_01535",
	  "CLB_01587",
	  "CLB_01632",
	  "CLB_01648",
	  "CLB_01683",
	  "CLB_01690"
	];

	// KIỂM TRA SỐ ĐIỆN THOẠI
	function isValidPhone(phone){
    	const regex = /^(0[0-9]{9})$/;
    	return regex.test(phone);
	}

    form.addEventListener("submit", function(e) {
    e.preventDefault();
if(sending) return; // chống bấm nhiều lần
    successMsg.style.display = "none";
    errorMsg.style.display = "none";

    const formData = new FormData(form);

    const ma_clb = formData.get("ma_clb").trim();
    const phone = formData.get("dien_thoai").trim();

    // KIỂM TRA MÃ CLB
    if(!validCLB.includes(ma_clb)){
        errorMsg.innerText="Mã CLB không đúng. Vui lòng chọn trong danh sách.";
        errorMsg.style.display="block";
        return;
    }

    // KIỂM TRA ĐIỆN THOẠI
    if(!isValidPhone(phone)){
        errorMsg.innerText="Số điện thoại không đúng. Vui lòng nhập 10 số bắt đầu bằng 0.";
        errorMsg.style.display="block";
        return;
    }

    sending = true;
    submitBtn.disabled = true;
    submitBtn.innerText = "ĐANG GỬI...";

    fetch(SCRIPT_URL, {
      method: "POST",
      body: formData   // 👈 Gửi trực tiếp FormData
    })
    .then(res => res.text())
    .then(text => {
      console.log(text);
      successMsg.style.display = "block";
      form.reset();
    })
    .catch(err => {
      console.error(err);
      errorMsg.innerText="Gửi dữ liệu thất bại. Vui lòng thử lại.";
      errorMsg.style.display = "block";
    })
    .finally(()=>{

        setTimeout(()=>{
            sending=false;
            submitBtn.disabled=false;
            submitBtn.innerText="XÁC NHẬN ĐĂNG KÝ";
        },3000);

    });
  });
</script>

</body>
</html>
