<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ĐĂNG KÝ THI CẤP</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f6fb;
margin:0;
padding:30px;
}

/* CONTAINER */

.container{
max-width:800px;
margin:auto;
background:white;
border-radius:16px;
padding:40px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:20px;
margin-bottom:30px;
}

.logo{
height:90px;
}

.title{
flex:1;
text-align:center;
font-size:32px;
font-weight:700;
letter-spacing:1px;
}

/* GRID */

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

/* MATERIAL FIELD */

.material-field{
position:relative;
margin-bottom:22px;
}

.material-field input{
width:100%;
padding:18px 14px 8px 46px;
border-radius:10px;
border:1px solid #d7d7d7;
font-size:15px;
transition:0.2s;
box-sizing:border-box;
}

.material-field label{
position:absolute;
left:46px;
top:16px;
color:#777;
font-size:15px;
pointer-events:none;
transition:0.2s;
background:white;
padding:0 4px;
}

/* ICON */

.material-icons{
position:absolute;
left:14px;
top:18px;
font-size:20px;
color:#666;
}

/* FOCUS */

.material-field input:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 0 3px rgba(37,99,235,0.12);
}

.material-field input:focus + label,
.material-field input:not(:placeholder-shown) + label{
top:-8px;
font-size:13px;
color:#2563eb;
}

/* BUTTON */

.btn-submit{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#2563eb,#111827);
color:white;
margin-top:8px;
transition:0.2s;
}

.btn-submit:hover{
opacity:0.92;
transform:translateY(-1px);
}

/* MESSAGES */

.success,.error{
display:none;
margin-top:16px;
padding:12px;
border-radius:8px;
font-weight:600;
}

.success{
background:#ecfdf5;
border:1px solid #10b981;
color:#065f46;
}

.error{
background:#fef2f2;
border:1px solid #ef4444;
color:#7f1d1d;
}

/* MOBILE */

@media(max-width:768px){

body{
padding:15px;
}

.container{
padding:25px;
}

.logo{
height:65px;
}

.title{
font-size:24px;
}

.row{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="Logo.jpg" class="logo">
<div class="title">ĐĂNG KÝ THI CẤP</div>
</div>

<form id="registerForm">

<div class="material-field">
<span class="material-icons">sports_martial_arts</span>
<input list="clbList" name="ma_clb" placeholder=" " required>
<label>Mã câu lạc bộ *</label>
</div>

<option value="CLB_00608">
<option value="CLB_00615">
<option value="CLB_00654">
<option value="CLB_00655">
<option value="CLB_00656">
<option value="CLB_00657">
<option value="CLB_00658">

<option value="CLB_00821">

<option value="CLB_00898">

<option value="CLB_00900">
<option value="CLB_00901">
<option value="CLB_00906">
<option value="CLB_00907">
<option value="CLB_00939">

<option value="CLB_00950">
<option value="CLB_00951">
<option value="CLB_00953">

<option value="CLB_00988">

<option value="CLB_01632">

<option value="CLB_01683">
<option value="CLB_01690">

</datalist>

<div class="row">

<div class="material-field">
<span class="material-icons">calendar_month</span>
<input type="date" name="ngay_thi" placeholder=" " required>
<label>Ngày thi *</label>
</div>

<div class="material-field">
<span class="material-icons">schedule</span>
<input type="time" name="gio_thi" placeholder=" " required>
<label>Thời gian *</label>
</div>

</div>

<div class="material-field">
<span class="material-icons">location_on</span>
<input type="text" name="dia_diem" placeholder=" " required>
<label>Địa điểm tổ chức *</label>
</div>

<div class="material-field">
<span class="material-icons">groups</span>
<input type="number" name="so_luong" min="1" max="1000" placeholder=" " required>
<label>Số lượng dự kiến *</label>
</div>

<div class="material-field">
<span class="material-icons">phone</span>
<input type="tel" name="dien_thoai" pattern="0[0-9]{9}" maxlength="10" placeholder=" " required>
<label>Thông tin liên hệ</label>
</div>

<button class="btn-submit" type="submit">XÁC NHẬN ĐĂNG KÝ</button>

<div class="success" id="successMsg">Đăng ký thành công! Dữ liệu đã được gửi.</div>
<div class="error" id="errorMsg">Gửi dữ liệu thất bại. Vui lòng thử lại.</div>

</form>
</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzB5CkEWNAJrxOP-qC9p-yZI2mjVi9N5HiQ4FsloVrRmnD26B5ahTv-nqJPnFiZb-gt/exec";

const form=document.getElementById("registerForm");
const successMsg=document.getElementById("successMsg");
const errorMsg=document.getElementById("errorMsg");
const submitBtn=document.querySelector(".btn-submit");

let sending=false;

const validCLB=[
"CLB_00201","CLB_00202","CLB_00215","CLB_00260","CLB_00383","CLB_00593","CLB_00603","CLB_00604","CLB_00605","CLB_00606","CLB_00607","CLB_00608","CLB_00615","CLB_00654","CLB_00655","CLB_00656","CLB_00657","CLB_00658","CLB_00659","CLB_00660","CLB_00661","CLB_00662","CLB_00782","CLB_00818","CLB_00819","CLB_00820","CLB_00821","CLB_00842","CLB_00843","CLB_00844","CLB_00845","CLB_00846","CLB_00847","CLB_00848","CLB_00849","CLB_00850","CLB_00851","CLB_00897","CLB_00898","CLB_00899","CLB_00900","CLB_00901","CLB_00906","CLB_00907","CLB_00939","CLB_00940","CLB_00950","CLB_00951","CLB_00953","CLB_00954","CLB_00955","CLB_00988","CLB_01007","CLB_01009","CLB_01016","CLB_01081","CLB_01103","CLB_01267","CLB_01353","CLB_01369","CLB_01371","CLB_01453","CLB_01535","CLB_01587","CLB_01632","CLB_01648","CLB_01683","CLB_01690"
];

function isValidPhone(phone){
return /^(0[0-9]{9})$/.test(phone);
}

form.addEventListener("submit",function(e){

e.preventDefault();

if(sending) return;

successMsg.style.display="none";
errorMsg.style.display="none";

const formData=new FormData(form);

const ma_clb=formData.get("ma_clb").trim();
const phone=formData.get("dien_thoai").trim();

if(!validCLB.includes(ma_clb)){
errorMsg.innerText="Mã CLB không đúng. Vui lòng chọn trong danh sách.";
errorMsg.style.display="block";
return;
}

if(!isValidPhone(phone)){
errorMsg.innerText="Số điện thoại không đúng. Vui lòng nhập 10 số bắt đầu bằng 0.";
errorMsg.style.display="block";
return;
}

sending=true;

submitBtn.disabled=true;
submitBtn.innerText="ĐANG GỬI...";

fetch(SCRIPT_URL,{
method:"POST",
body:formData,
mode:"cors"
})

.then(res=>res.text())

.then(text=>{
console.log(text);
successMsg.style.display="block";
form.reset();
})

.catch(err=>{
console.error(err);
errorMsg.innerText="Gửi dữ liệu thất bại. Vui lòng thử lại.";
errorMsg.style.display="block";
})

.finally(()=>{

setTimeout(()=>{
sending=false;
submitBtn.disabled=false;
submitBtn.innerText="ĐĂNG KÝ";
},3000);

});

});

</script>

</body>
</html>
